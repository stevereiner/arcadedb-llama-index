[pytest]
# Disable pytest's faulthandler plugin.
#
# Python's faulthandler installs a signal handler that dumps tracebacks when
# it receives SIGSEGV / access-violation signals.  The JVM (via JPype) uses
# those same signals internally during startup and normal operation, causing
# spurious "Windows fatal exception: access violation" dumps to the console
# even though no actual crash has occurred.  Disabling faulthandler silences
# these dumps while leaving all test results unaffected.
addopts = -p no:faulthandler
